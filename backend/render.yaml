services:
  - type: web
    name: vault-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: TOKEN_EXPIRE_HOURS
        value: 12
      - key: DB_PATH
        value: /opt/render/project/src/vault.db
